<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a52c9"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4a520"/>
      <stop offset="100%" stop-color="#9a7010"/>
    </linearGradient>
  </defs>

  <!-- Fondo navy premium -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Cuerpo cámara -->
  <rect x="60" y="170" width="392" height="222" rx="38" fill="#ffffff" opacity="0.97"/>

  <!-- Visor pentaprisma -->
  <rect x="178" y="118" width="156" height="60" rx="18" fill="#ffffff" opacity="0.97"/>
  <rect x="192" y="130" width="128" height="36" rx="12" fill="#1e3a8a" opacity="0.45"/>

  <!-- Flash -->
  <rect x="68" y="118" width="80" height="60" rx="18" fill="url(#gold)"/>

  <!-- Anillo lente exterior (gold) -->
  <circle cx="256" cy="281" r="92" fill="url(#gold)"/>
  <!-- Anillo lente medio (navy) -->
  <circle cx="256" cy="281" r="74" fill="#1e3a8a"/>
  <!-- Iris gold -->
  <circle cx="256" cy="281" r="56" fill="url(#gold)"/>
  <!-- Pupila navy -->
  <circle cx="256" cy="281" r="36" fill="#1e3a8a"/>
  <!-- Reflejo -->
  <circle cx="232" cy="258" r="12" fill="#ffffff" opacity="0.55"/>
  <circle cx="228" cy="254" r="5" fill="#ffffff" opacity="0.38"/>

  <!-- Texto SF en cuerpo cámara -->
  <text x="410" y="368" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="52" font-weight="900" fill="#1e3a8a" opacity="0.55">SF</text>
</svg>
